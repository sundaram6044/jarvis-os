<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>JARVIS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;touch-action:none;user-select:none;}

/* ── BOOT ── */
#boot{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .8s ease;}
.boot-ring{width:80px;height:80px;border-radius:50%;border:1.5px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;margin-bottom:32px;position:relative;}
.boot-ring::before{content:'';position:absolute;inset:-1px;border-radius:50%;border:1.5px solid transparent;border-top-color:rgba(255,255,255,.5);animation:spin 1.2s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.boot-icon{font-size:28px;}
.boot-label{font-size:12px;letter-spacing:6px;color:rgba(255,255,255,.35);}

/* ── PASSTHROUGH WORLD ── */
#world{position:fixed;inset:0;z-index:0;}
#cam-back{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
/* VR split */
#cam-back-r{position:absolute;top:0;left:50%;width:50%;height:100%;object-fit:cover;display:none;}
#cam-back.vr{width:50%;}
#vr-divider{display:none;position:absolute;left:50%;top:0;bottom:0;width:2px;background:#000;z-index:2;}
/* No camera fallback - dark space */
#no-cam-bg{position:absolute;inset:0;background:radial-gradient(ellipse at center,#0a0a1a 0%,#000 100%);display:none;}
/* Subtle scan lines */
#world::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:1;}

/* ── HAND CANVAS (drawn on top of world) ── */
#hand-canvas{position:fixed;inset:0;z-index:10;pointer-events:none;}

/* ── GAZE CURSOR ── */
#gaze{position:fixed;z-index:20;pointer-events:none;transform:translate(-50%,-50%);display:none;transition:left .06s ease,top .06s ease;}
.gaze-ring{width:32px;height:32px;border-radius:50%;border:1.5px solid rgba(255,255,255,.6);position:relative;display:flex;align-items:center;justify-content:center;}
.gaze-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.9);}
.gaze-ring.focused{border-color:rgba(255,255,255,.95);box-shadow:0 0 16px rgba(255,255,255,.2);}
.gaze-ring.pinch{border-color:#4A9EFF;box-shadow:0 0 20px rgba(74,158,255,.4);animation:pinchPulse .3s ease;}
@keyframes pinchPulse{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

/* ── HUD (always visible) ── */
#hud{position:fixed;inset:0;z-index:15;pointer-events:none;}
/* Corners */
.hud-corner{position:absolute;width:20px;height:20px;border-color:rgba(255,255,255,.25);border-style:solid;}
.hc-tl{top:14px;left:14px;border-width:1px 0 0 1px;}
.hc-tr{top:14px;right:14px;border-width:1px 1px 0 0;}
.hc-bl{bottom:14px;left:14px;border-width:0 0 1px 1px;}
.hc-br{bottom:14px;right:14px;border-width:0 1px 1px 0;}
/* Status strip */
#hud-top{position:absolute;top:0;left:0;right:0;padding:16px 22px;display:flex;justify-content:space-between;align-items:flex-start;}
.hud-time{font-size:13px;font-weight:500;color:rgba(255,255,255,.8);letter-spacing:.3px;}
.hud-status{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.hud-pill{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.45);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:3px 10px;}
/* Hand indicators */
#hud-hands{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:16px;align-items:flex-end;}
.hand-ind{display:flex;flex-direction:column;align-items:center;gap:4px;opacity:.4;transition:opacity .2s;}
.hand-ind.active{opacity:1;}
.hand-ico{font-size:20px;}
.hand-lbl{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.6);}
.hand-gesture{font-size:9px;letter-spacing:1px;color:rgba(255,255,255,.9);background:rgba(255,255,255,.1);border-radius:10px;padding:2px 8px;min-height:16px;text-align:center;}

/* ── FLOATING WINDOWS ── */
.fw{position:fixed;z-index:30;border-radius:24px;overflow:hidden;transform-origin:center center;transition:box-shadow .2s;}
.fw-glass{background:rgba(20,20,30,.72);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.14);border-radius:24px;width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;}
.fw.focused .fw-glass{border-color:rgba(255,255,255,.28);box-shadow:0 32px 80px rgba(0,0,0,.6);}
/* Window title bar */
.fw-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;cursor:grab;}
.fw-bar:active{cursor:grabbing;}
.fw-title{font-size:14px;font-weight:600;color:rgba(255,255,255,.9);letter-spacing:-.2px;}
.fw-controls{display:flex;gap:7px;}
.fw-btn{width:13px;height:13px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0;}
.fw-close{background:#FF453A;} .fw-min{background:#FFD60A;} .fw-max{background:#32D74B;}
/* Window body */
.fw-body{flex:1;overflow-y:auto;padding:16px 18px;}
.fw-body::-webkit-scrollbar{width:0;}
/* Focus glow ring around window */
.fw-focus-ring{position:absolute;inset:-2px;border-radius:26px;border:2px solid rgba(255,255,255,.15);pointer-events:none;opacity:0;transition:opacity .2s;}
.fw.focused .fw-focus-ring{opacity:1;}

/* ── GESTURE FLASH ── */
#gesture-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;pointer-events:none;text-align:center;opacity:0;transition:opacity .15s;}
#gesture-flash.show{opacity:1;}
.gf-icon{font-size:56px;}
.gf-text{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.8);margin-top:8px;background:rgba(0,0,0,.4);padding:4px 14px;border-radius:20px;display:inline-block;}

/* ── PINCH RIPPLE ── */
.pinch-ripple{position:fixed;border-radius:50%;border:2px solid rgba(74,158,255,.8);pointer-events:none;z-index:40;animation:ripple .5s ease-out forwards;transform:translate(-50%,-50%);}
@keyframes ripple{from{width:0;height:0;opacity:.9}to{width:70px;height:70px;opacity:0}}

/* ── VOICE BAR ── */
#voice-bar{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(20,20,30,.9);border:1px solid rgba(255,255,255,.15);border-radius:30px;padding:12px 20px;display:flex;align-items:center;gap:12px;z-index:60;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(30px);}
#voice-bar.show{opacity:1;}
.v-waves{display:flex;gap:3px;align-items:center;height:20px;}
.v-wave{width:3px;border-radius:2px;background:#4A9EFF;animation:wv .8s ease-in-out infinite;}
.v-wave:nth-child(1){height:6px;animation-delay:0s}.v-wave:nth-child(2){height:14px;animation-delay:.1s}.v-wave:nth-child(3){height:20px;animation-delay:.2s}.v-wave:nth-child(4){height:12px;animation-delay:.3s}.v-wave:nth-child(5){height:8px;animation-delay:.4s}
@keyframes wv{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
#voice-text{font-size:14px;color:rgba(255,255,255,.9);font-weight:500;min-width:160px;}

/* ── WINDOW CONTENTS ── */
/* JARVIS AI */
.ai-msgs{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;max-height:200px;overflow-y:auto;}
.ai-msgs::-webkit-scrollbar{width:0;}
.ai-bubble{padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.5;max-width:88%;}
.ai-j{align-self:flex-start;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.9);}
.ai-u{align-self:flex-end;background:#4A9EFF;color:#fff;}
.ai-thinking{opacity:.5;font-style:italic;}
.ai-input-row{display:flex;gap:8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:6px 6px 6px 14px;}
.ai-input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:13px;}
.ai-input::placeholder{color:rgba(255,255,255,.3);}
.ai-send{width:30px;height:30px;border-radius:50%;background:#4A9EFF;border:none;color:#fff;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
/* SENSORS */
.sens-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sens-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:12px;}
.sens-val{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.5px;}
.sens-lbl{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:1px;margin-top:3px;}
/* CLOCK */
.clock-time{font-size:48px;font-weight:200;color:#fff;letter-spacing:-2px;text-align:center;padding:10px 0 4px;}
.clock-date{font-size:12px;color:rgba(255,255,255,.45);text-align:center;letter-spacing:.5px;}
/* SYSTEM */
.sys-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.07);}
.sys-item:last-child{border-bottom:none;}
.sys-l{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,.6);}
.sys-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sys-r{font-size:11px;font-weight:500;}
/* NOTES */
.notes-ta{width:100%;min-height:120px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-size:13px;padding:12px;outline:none;resize:none;line-height:1.6;margin-bottom:8px;font-family:inherit;}
.notes-ta::placeholder{color:rgba(255,255,255,.25);}
.notes-save{width:100%;background:#4A9EFF;border:none;color:#fff;padding:10px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.saved-note{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 12px;margin-top:8px;font-size:12px;color:rgba(255,255,255,.8);line-height:1.5;}
/* MENU BAR */
#menubar{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);z-index:35;transition:transform .4s cubic-bezier(.2,.8,.2,1);padding-bottom:20px;}
#menubar.show{transform:translateX(-50%) translateY(0);}
.menu-wrap{background:rgba(20,20,30,.85);backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.15);border-radius:26px;padding:10px 14px;display:flex;gap:10px;align-items:center;}
.menu-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 12px;border-radius:16px;cursor:pointer;transition:background .2s;min-width:54px;}
.menu-item:active{background:rgba(255,255,255,.1);}
.menu-ico{font-size:24px;}
.menu-lbl{font-size:9px;color:rgba(255,255,255,.5);letter-spacing:.5px;}
.menu-sep{width:1px;height:36px;background:rgba(255,255,255,.1);}
</style>
</head>
<body>

<!-- BOOT -->
<div id="boot">
  <div class="boot-ring"><div class="boot-icon">⬡</div></div>
  <div class="boot-label">JARVIS</div>
</div>

<!-- WORLD (camera passthrough) -->
<div id="world">
  <div id="no-cam-bg"></div>
  <video id="cam-back" autoplay playsinline muted></video>
  <video id="cam-back-r" autoplay playsinline muted></video>
  <div id="vr-divider"></div>
</div>

<!-- HAND TRACKING CANVAS -->
<canvas id="hand-canvas"></canvas>

<!-- GAZE CURSOR -->
<div id="gaze">
  <div class="gaze-ring" id="gaze-ring">
    <div class="gaze-dot"></div>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-corner hc-tl"></div>
  <div class="hud-corner hc-tr"></div>
  <div class="hud-corner hc-bl"></div>
  <div class="hud-corner hc-br"></div>
  <div id="hud-top">
    <div class="hud-time" id="hud-time">00:00</div>
    <div class="hud-status">
      <div class="hud-pill" id="hud-mode">JARVIS OS</div>
      <div class="hud-pill" id="hud-fps" style="margin-top:3px">-- FPS</div>
    </div>
  </div>
  <div id="hud-hands">
    <div class="hand-ind" id="hand-l-ind">
      <div class="hand-gesture" id="hand-l-gest"></div>
      <div class="hand-ico">🤚</div>
      <div class="hand-lbl">LEFT</div>
    </div>
    <div class="hand-ind" id="hand-r-ind">
      <div class="hand-gesture" id="hand-r-gest"></div>
      <div class="hand-ico">🤚</div>
      <div class="hand-lbl">RIGHT</div>
    </div>
  </div>
</div>

<!-- GESTURE FLASH -->
<div id="gesture-flash">
  <div class="gf-icon" id="gf-icon"></div>
  <div class="gf-text" id="gf-text"></div>
</div>

<!-- VOICE BAR -->
<div id="voice-bar">
  <div class="v-waves"><div class="v-wave"></div><div class="v-wave"></div><div class="v-wave"></div><div class="v-wave"></div><div class="v-wave"></div></div>
  <div id="voice-text">Listening…</div>
</div>

<!-- MENU BAR (swipe up to show) -->
<div id="menubar">
  <div class="menu-wrap">
    <div class="menu-item" onclick="spawnWindow('jarvis')"><div class="menu-ico">🤖</div><div class="menu-lbl">JARVIS</div></div>
    <div class="menu-item" onclick="spawnWindow('clock')"><div class="menu-ico">🕐</div><div class="menu-lbl">CLOCK</div></div>
    <div class="menu-item" onclick="spawnWindow('sensors')"><div class="menu-ico">📡</div><div class="menu-lbl">SENSORS</div></div>
    <div class="menu-item" onclick="spawnWindow('notes')"><div class="menu-ico">📝</div><div class="menu-lbl">NOTES</div></div>
    <div class="menu-item" onclick="spawnWindow('system')"><div class="menu-ico">🗺</div><div class="menu-lbl">SYSTEM</div></div>
    <div class="menu-sep"></div>
    <div class="menu-item" onclick="toggleVR()"><div class="menu-ico">👓</div><div class="menu-lbl">VR</div></div>
    <div class="menu-item" onclick="startVoice()"><div class="menu-ico">🎤</div><div class="menu-lbl">VOICE</div></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  JARVIS SPATIAL OS
//  Camera passthrough + floating windows + hand control
// ══════════════════════════════════════════════════════════

var windows=[], focusedWin=null, winCount=0, notes=[];
var camStream=null, handsModel=null, handsActive=false;
var vrMode=false, menuVisible=false;
var gazeX=window.innerWidth/2, gazeY=window.innerHeight/2;
var tgx=gazeX, tgy=gazeY;
var fpsCount=0, lastFPS=Date.now();
var chatHistory=[], isThinking=false;
var rec=null, isListening=false;
var lastPinchTime=0, pinchActive=false;
var swipeStartY=0, swipeStartT=0;

// ── BOOT ──────────────────────────────────────────────────
window.onload=function(){
  setTimeout(function(){
    var b=document.getElementById('boot');
    b.style.opacity='0';
    setTimeout(function(){
      b.style.display='none';
      startJARVIS();
    },800);
  },1800);
};

function startJARVIS(){
  startClock();
  resizeCanvas();
  startCamera();
  startGyro();
  // Spawn starter windows after camera loads
  setTimeout(function(){
    spawnWindow('jarvis');
    setTimeout(function(){ spawnWindow('clock'); },400);
  },1200);
  // Gesture hints
  showGestureFlash('👆','SWIPE UP FOR MENU');
  setTimeout(function(){showGestureFlash('🤏','PINCH TO SELECT');},3000);
}

// ── CAMERA ──────────────────────────────────────────────
function startCamera(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    document.getElementById('no-cam-bg').style.display='block';
    enableTouchFallback(); return;
  }
  // Use front camera — works for BOTH passthrough and hand tracking on one device
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:false
  }).then(function(s){
    camStream=s;
    var v=document.getElementById('cam-back');
    var vr=document.getElementById('cam-back-r');
    // Mirror front camera
    v.style.transform='scaleX(-1)'; vr.style.transform='scaleX(-1)';
    v.srcObject=s; vr.srcObject=s; v.play(); vr.play();
    document.getElementById('hud-mode').textContent='LOADING HANDS...';
    loadHandTrackingOnStream(s);
  }).catch(function(){
    // Try back camera (hands won't work but passthrough will)
    navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false
    }).then(function(s){
      camStream=s;
      var v=document.getElementById('cam-back');
      v.srcObject=s; v.play();
      document.getElementById('hud-mode').textContent='TOUCH MODE';
      enableTouchFallback();
    }).catch(function(){
      document.getElementById('no-cam-bg').style.display='block';
      document.getElementById('hud-mode').textContent='NO CAMERA';
      enableTouchFallback();
    });
  });
}

// ── VR SPLIT ─────────────────────────────────────────────
function toggleVR(){
  vrMode=!vrMode;
  var v=document.getElementById('cam-back');
  var vr=document.getElementById('cam-back-r');
  var d=document.getElementById('vr-divider');
  if(vrMode){v.classList.add('vr');vr.style.display='block';d.style.display='block';}
  else{v.classList.remove('vr');vr.style.display='none';d.style.display='none';}
  document.getElementById('hud-mode').textContent=vrMode?'VR MODE':'AR VISION';
  showGestureFlash(vrMode?'👓':'📱',vrMode?'VR MODE — PUT ON HEADSET':'SINGLE SCREEN');
  hideMenu();
}

// ── HAND TRACKING ─────────────────────────────────────────────────────────
function loadHandTrackingOnStream(stream){
  document.getElementById('hud-mode').textContent='LOADING MP...';
  // Hidden video element for MediaPipe
  var vid=document.createElement('video');
  vid.srcObject=stream;vid.autoplay=true;vid.playsInline=true;vid.muted=true;
  vid.style.cssText='position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;top:0;left:0;';
  document.body.appendChild(vid);
  vid.play().then(function(){
    loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js',function(){
      if(!window.Hands){
        document.getElementById('hud-mode').textContent='TOUCH MODE';
        enableTouchFallback(); return;
      }
      setupHands(vid);
    });
  });
  setTimeout(function(){
    if(!handsActive){
      document.getElementById('hud-mode').textContent='TOUCH MODE';
      enableTouchFallback();
    }
  },15000);
}

function loadScript(src,cb){
  var ex=document.querySelector('script[src="'+src+'"]');
  if(ex){setTimeout(cb,100);return;}
  var s=document.createElement('script');
  s.src=src;s.crossOrigin='anonymous';
  s.onload=function(){setTimeout(cb,200);};
  s.onerror=function(){cb();};
  document.head.appendChild(s);
}

function setupHands(vid){
  document.getElementById('hud-mode').textContent='INIT HANDS...';
  try{
    handsModel=new Hands({
      locateFile:function(f){
        return'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/'+f;
      }
    });
    handsModel.setOptions({
      maxNumHands:2,modelComplexity:1,
      minDetectionConfidence:0.7,minTrackingConfidence:0.6
    });
    handsModel.onResults(onHandResults);
    // Process frames manually
    var busy=false;
    (async function loop(){
      requestAnimationFrame(loop);
      if(busy||!handsModel||vid.readyState<2)return;
      busy=true;
      try{await handsModel.send({image:vid});}catch(e){}
      busy=false;
    })();
    // Mark active after first result
    handsModel.onResults=function(r){
      if(!handsActive){
        handsActive=true;
        document.getElementById('hud-mode').textContent='AR VISION';
        document.getElementById('gaze').style.display='block';
        showGestureFlash('✋','HAND TRACKING ACTIVE');
      }
      onHandResults(r);
    };
  }catch(e){
    document.getElementById('hud-mode').textContent='TOUCH MODE';
    enableTouchFallback();
  }
}

// ── TOUCH FALLBACK ─────────────────────────────────────────────
function enableTouchFallback(){
  document.getElementById('gaze').style.display='block';
  document.addEventListener('touchmove',function(e){
    if(e.target.closest('.fw')||e.target.closest('#menubar'))return;
    tgx=e.touches[0].clientX; tgy=e.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(e.target.closest('.fw')||e.target.closest('#menubar'))return;
    var x=e.changedTouches[0].clientX,y=e.changedTouches[0].clientY;
    spawnRipple(x,y); onPinch(x,y,'TAP');
  },{passive:true});
}

// legacy alias
function loadHandTracking(){ loadHandTrackingOnStream && camStream ? loadHandTrackingOnStream(camStream) : enableTouchFallback(); }
function initHands(){ loadHandTracking(); }
// ── HAND CONNECTIONS ──────────────────────────────────────
var CONN=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
var TIPS=[4,8,12,16,20];
var TIPS_OBJ={thumb:4,index:8,middle:12,ring:16,pinky:20};

// ── ADVANCED GESTURE STATE ────────────────────────────────
var hands = {
  L: null, R: null,  // current frame landmarks
  Lg: null, Rg: null // current gestures
};
var twoHandState = {
  zooming: false, rotating: false, throwing: false,
  lastDist: 0, lastAngle: 0,
  throwVelX: 0, throwVelY: 0,
  lastRX: 0, lastRY: 0,
  history: [] // for throw velocity
};
var wristHistory = [];
var pinchCooldown = false;

function onHandResults(results){
  var canvas = document.getElementById('hand-canvas');
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  var detected = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;

  if(!detected){
    document.getElementById('hand-l-ind').classList.remove('active');
    document.getElementById('hand-r-ind').classList.remove('active');
    hands.L = hands.R = null;
    twoHandState.zooming = false;
    twoHandState.rotating = false;
    pinchActive = false;
    return;
  }

  // Assign hands by handedness
  hands.L = null; hands.R = null;
  results.multiHandLandmarks.forEach(function(lm, hi){
    var label = results.multiHandedness && results.multiHandedness[hi]
      ? results.multiHandedness[hi].label : 'Right';
    if(label === 'Left')  hands.L = lm;
    else                  hands.R = lm;
  });

  var mxf = function(x){ return 1 - x; }; // mirror function

  // Draw both hands
  results.multiHandLandmarks.forEach(function(lm, hi){
    var isLeft = results.multiHandedness && results.multiHandedness[hi] &&
                 results.multiHandedness[hi].label === 'Left';
    var col = isLeft ? 'rgba(100,200,255,' : 'rgba(255,255,255,';

    // Skeleton
    CONN.forEach(function(c){
      ctx.beginPath();
      ctx.moveTo(mxf(lm[c[0]].x)*W, lm[c[0]].y*H);
      ctx.lineTo(mxf(lm[c[1]].x)*W, lm[c[1]].y*H);
      ctx.strokeStyle = col + '0.4)';
      ctx.lineWidth = 1.5; ctx.stroke();
    });

    // Joints
    lm.forEach(function(p, i){
      var isTip = TIPS.indexOf(i) !== -1;
      ctx.beginPath();
      ctx.arc(mxf(p.x)*W, p.y*H, isTip ? 8 : 3.5, 0, Math.PI*2);
      ctx.fillStyle = isTip ? col + '1)' : col + '0.5)';
      ctx.fill();
    });

    // Tip glow on index
    var idx = lm[TIPS_OBJ.index];
    var glow = ctx.createRadialGradient(
      mxf(idx.x)*W, idx.y*H, 0,
      mxf(idx.x)*W, idx.y*H, 18
    );
    glow.addColorStop(0, col + '0.4)');
    glow.addColorStop(1, col + '0)');
    ctx.beginPath();
    ctx.arc(mxf(idx.x)*W, idx.y*H, 18, 0, Math.PI*2);
    ctx.fillStyle = glow; ctx.fill();
  });

  // ── TWO HAND GESTURES ──────────────────────────────────
  if(hands.L && hands.R){
    processTwoHands(hands.L, hands.R, mxf, W, H, ctx);
  } else {
    twoHandState.zooming = false;
    twoHandState.rotating = false;
  }

  // ── SINGLE HAND LOGIC ──────────────────────────────────
  var dominant = hands.R || hands.L;
  if(dominant){
    var lm = dominant;
    var g = detectGesture(lm, mxf);
    hands.Rg = g;

    // Update gaze cursor from index tip
    tgx = mxf(lm[TIPS_OBJ.index].x) * W;
    tgy = lm[TIPS_OBJ.index].y * H;

    // HUD indicators
    var rInd = document.getElementById('hand-r-ind');
    var rGest = document.getElementById('hand-r-gest');
    rInd.classList.add('active');
    if(g) rGest.textContent = g.icon + ' ' + g.label;

    // Single-hand gesture actions
    if(!twoHandState.zooming && !twoHandState.rotating){
      handleSingleHand(g, lm, mxf, W, H);
    }

    // PINCH detection — right/dominant hand
    var th = lm[TIPS_OBJ.thumb], ix = lm[TIPS_OBJ.index];
    var pDist = Math.hypot(mxf(th.x)-mxf(ix.x), th.y-ix.y);
    var nowPinching = pDist < 0.055;

    document.getElementById('gaze-ring').className = 'gaze-ring' + (nowPinching ? ' pinch' : '');

    if(nowPinching && !pinchActive && !pinchCooldown){
      pinchActive = true; pinchCooldown = true;
      var px = mxf(ix.x)*W, py = ix.y*H;
      onPinch(px, py, g ? g.label : '');
      setTimeout(function(){ pinchCooldown = false; }, 450);
    } else if(!nowPinching){ pinchActive = false; }
  }

  // Left hand indicator
  if(hands.L){
    var lg = detectGesture(hands.L, mxf);
    document.getElementById('hand-l-ind').classList.add('active');
    document.getElementById('hand-l-gest').textContent = lg ? lg.icon + ' ' + lg.label : '';
  }

  // FPS
  fpsCount++;
  var now = Date.now();
  if(now - lastFPS > 600){
    document.getElementById('hud-fps').textContent = Math.round(fpsCount*1000/(now-lastFPS)) + ' FPS';
    fpsCount = 0; lastFPS = now;
  }
}

// ── TWO HAND PROCESSING ────────────────────────────────────
function processTwoHands(lL, lR, mxf, W, H, ctx){
  var lIdx = lL[TIPS_OBJ.index], rIdx = lR[TIPS_OBJ.index];
  var lx = mxf(lIdx.x)*W, ly = lIdx.y*H;
  var rx = mxf(rIdx.x)*W, ry = rIdx.y*H;
  var midX = (lx+rx)/2, midY = (ly+ry)/2;
  var dist = Math.hypot(rx-lx, ry-ly);
  var angle = Math.atan2(ry-ly, rx-lx);

  // Draw two-hand connector line
  ctx.beginPath();
  ctx.moveTo(lx, ly); ctx.lineTo(rx, ry);
  ctx.strokeStyle = 'rgba(74,158,255,0.5)';
  ctx.lineWidth = 2; ctx.setLineDash([6,4]); ctx.stroke();
  ctx.setLineDash([]);
  // Midpoint dot
  ctx.beginPath(); ctx.arc(midX, midY, 8, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(74,158,255,0.8)'; ctx.fill();

  // Check if both hands are pinching (two-finger pinch)
  var lPinch = Math.hypot(mxf(lL[4].x)-mxf(lL[8].x), lL[4].y-lL[8].y) < 0.06;
  var rPinch = Math.hypot(mxf(lR[4].x)-mxf(lR[8].x), lR[4].y-lR[8].y) < 0.06;

  if(lPinch && rPinch){
    // ── ZOOM: two-hand pinch spread/squeeze ──
    if(!twoHandState.zooming){
      twoHandState.zooming = true;
      twoHandState.lastDist = dist;
      twoHandState.lastAngle = angle;
      showGestureFlash('🔍', 'TWO-HAND ZOOM');
    } else {
      var distDelta = dist - twoHandState.lastDist;
      var angleDelta = angle - twoHandState.lastAngle;

      if(focusedWin && Math.abs(distDelta) > 2){
        // ZOOM — resize window
        var el = focusedWin.el;
        var cw = el.offsetWidth, ch = el.offsetHeight;
        var scale = dist / twoHandState.lastDist;
        var nw = Math.max(180, Math.min(window.innerWidth*0.9, cw*scale));
        var nh = Math.max(120, Math.min(window.innerHeight*0.85, ch*scale));
        el.style.width = nw + 'px';
        el.style.height = nh + 'px';
        // Keep centred on midpoint
        el.style.left = (midX - nw/2) + 'px';
        el.style.top  = (midY - nh/2) + 'px';
        document.getElementById('hud-mode').textContent = 'ZOOM ' + Math.round(nw) + 'px';
      }

      if(focusedWin && Math.abs(angleDelta) > 0.03){
        // ROTATE — tilt window
        var el2 = focusedWin.el;
        var curRot = focusedWin._rotation || 0;
        curRot += angleDelta * (180/Math.PI) * 0.5;
        curRot = Math.max(-30, Math.min(30, curRot)); // cap at 30deg
        focusedWin._rotation = curRot;
        el2.style.transform = 'rotate(' + curRot + 'deg)';
        document.getElementById('hud-mode').textContent = 'ROTATE ' + Math.round(curRot) + '°';
      }

      twoHandState.lastDist = dist;
      twoHandState.lastAngle = angle;
    }

    // Draw zoom ring at midpoint
    ctx.beginPath(); ctx.arc(midX, midY, dist/2, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(74,158,255,0.3)'; ctx.lineWidth = 1.5; ctx.stroke();

  } else {
    if(twoHandState.zooming){
      twoHandState.zooming = false;
      if(focusedWin) document.getElementById('hud-mode').textContent = 'AR VISION';
    }
  }

  // ── CLAP (both fists close together) = close window ──
  var lFist = detectGesture(lL, mxf);
  var rFist = detectGesture(lR, mxf);
  if(lFist && lFist.label==='FIST' && rFist && rFist.label==='FIST'){
    if(dist < W * 0.1){
      // Clap!
      if(!twoHandState._clap){
        twoHandState._clap = true;
        if(focusedWin){
          throwWindow(focusedWin);
        } else {
          showGestureFlash('👏','CLAP — No window focused');
        }
        setTimeout(function(){twoHandState._clap=false;},1000);
      }
    }
  }
}

// ── THROW WINDOW ───────────────────────────────────────────
function throwWindow(win){
  if(!win)return;
  showGestureFlash('🚀','THROW TO DISMISS');
  var el = win.el;
  // Animate flying off screen
  el.style.transition = 'transform 0.5s cubic-bezier(.2,.8,.2,1), opacity 0.4s ease';
  el.style.transform = (win._rotation ? 'rotate('+win._rotation+'deg) ' : '') + 'translateY(-120vh) scale(0.5)';
  el.style.opacity = '0';
  setTimeout(function(){
    closeWindow(win.id);
    // Reset transform on others
  }, 500);
}

// ── SINGLE HAND GESTURE ACTIONS ────────────────────────────
function handleSingleHand(g, lm, mxf, W, H){
  if(!g) return;
  var label = g.label;
  var wy = lm[0].y * H;

  // Track wrist for swipe
  wristHistory.push({y:wy, x:mxf(lm[0].x)*W, t:Date.now()});
  if(wristHistory.length > 15) wristHistory.shift();

  // SWIPE detection
  if(wristHistory.length >= 6){
    var old = wristHistory[0], cur = wristHistory[wristHistory.length-1];
    var dy = old.y - cur.y;
    var dx = old.x - cur.x;
    var dt = cur.t - old.t;
    if(dt < 500 && Math.abs(dy) > H*0.12){
      if(dy > 0 && !menuVisible){ showMenu(); wristHistory = []; }
      else if(dy < 0 && menuVisible){ hideMenu(); wristHistory = []; }
    }
    if(dt < 500 && Math.abs(dx) > W*0.15 && focusedWin){
      // Horizontal swipe = throw sideways
      if(dx > 0){ throwWindowDir(focusedWin, 'right'); wristHistory = []; }
      else       { throwWindowDir(focusedWin, 'left');  wristHistory = []; }
    }
  }

  // OPEN = scroll
  if(label === 'OPEN' && focusedWin){
    var iy = lm[8].y * H;
    if(focusedWin._lastScrollY !== undefined){
      var body = focusedWin.el.querySelector('.fw-body');
      if(body) body.scrollTop += (focusedWin._lastScrollY - iy) * 2.5;
    }
    focusedWin._lastScrollY = iy;
  } else if(focusedWin){ focusedWin._lastScrollY = undefined; }

  // FIST = drag window
  if(label === 'FIST' && focusedWin){
    var ix2 = mxf(lm[9].x)*W, iy2 = lm[9].y*H;
    if(focusedWin._lastDragX !== undefined){
      var cl = parseInt(focusedWin.el.style.left)||100;
      var ct = parseInt(focusedWin.el.style.top)||100;
      focusedWin.el.style.left = (cl + ix2 - focusedWin._lastDragX) + 'px';
      focusedWin.el.style.top  = (ct + iy2 - focusedWin._lastDragY) + 'px';
      // Track velocity for throw
      focusedWin._velX = ix2 - focusedWin._lastDragX;
      focusedWin._velY = iy2 - focusedWin._lastDragY;
    }
    focusedWin._lastDragX = ix2; focusedWin._lastDragY = iy2;
  } else if(focusedWin){ focusedWin._lastDragX = undefined; }

  // PEACE = reset window rotation
  if(label === 'PEACE' && focusedWin){
    if(focusedWin._rotation){
      focusedWin._rotation = 0;
      focusedWin.el.style.transform = '';
      focusedWin.el.style.transition = 'transform 0.3s ease';
      setTimeout(function(){if(focusedWin)focusedWin.el.style.transition='';},300);
      showGestureFlash('✌️','RESET ROTATION');
    }
  }

  // THUMBS UP = open menu
  if(label === 'THUMBS UP'){ showMenu(); }

  // PINKY = voice command
  if(label === 'PINKY' && !isListening){ startVoice(); }
}

// ── THROW IN DIRECTION ─────────────────────────────────────
function throwWindowDir(win, dir){
  if(!win)return;
  showGestureFlash(dir==='right'?'➡️':'⬅️','SWIPE TO DISMISS');
  var el = win.el;
  var tx = dir === 'right' ? '130vw' : '-130vw';
  el.style.transition = 'transform 0.45s cubic-bezier(.2,.8,.6,1), opacity 0.35s ease';
  el.style.transform = (win._rotation?'rotate('+win._rotation+'deg) ':'') + 'translateX('+tx+') rotate('+(dir==='right'?15:-15)+'deg)';
  el.style.opacity = '0';
  setTimeout(function(){ closeWindow(win.id); }, 450);
}

// ── GESTURE DETECTION ─────────────────────────────────────
function detectGesture(lm, mxf){
  var up = function(tip,pip){ return lm[tip].y < lm[pip].y - 0.04; };
  var iu=up(8,6), mu=up(12,10), ru=up(16,14), pu=up(20,18);
  var tu = mxf(lm[4].x) < mxf(lm[3].x) - 0.04;
  var allUp   = iu&&mu&&ru&&pu;
  var allDown = !iu&&!mu&&!ru&&!pu;
  if(allDown)             return{label:'FIST',     icon:'✊'};
  if(allUp)               return{label:'OPEN',     icon:'✋'};
  if(iu&&!mu&&!ru&&!pu)  return{label:'POINT',    icon:'☝️'};
  if(iu&&mu&&!ru&&!pu)   return{label:'PEACE',    icon:'✌️'};
  if(tu&&allDown)         return{label:'THUMBS UP',icon:'👍'};
  if(!iu&&!mu&&!ru&&pu)  return{label:'PINKY',    icon:'🤙'};
  return null;
}

// ── PINCH ACTION ──────────────────────────────────────────
function onPinch(x, y, gesture){
  spawnRipple(x, y);
  var hit = hitTestWindows(x, y);
  if(hit){
    focusWindow(hit);
    var btn = hitTestButton(hit, x, y);
    if(btn === 'close') throwWindow(hit);
    else if(btn === 'min') minimizeWindow(hit.id);
  } else {
    if(!menuVisible) showMenu(); else hideMenu();
  }
}

// ── GAZE SMOOTH ───────────────────────────────────────────
setInterval(function(){
  gazeX+=(tgx-gazeX)*.12;
  gazeY+=(tgy-gazeY)*.12;
  var g=document.getElementById('gaze');
  g.style.left=gazeX+'px';
  g.style.top=gazeY+'px';
},16);

// ── WINDOW SYSTEM ─────────────────────────────────────────
var WIN_DEFS={
  jarvis:{title:'🤖 JARVIS AI',w:280,h:320,build:buildJarvis},
  clock: {title:'🕐 Clock',    w:200,h:140,build:buildClock},
  sensors:{title:'📡 Sensors', w:240,h:220,build:buildSensors},
  notes: {title:'📝 Notes',    w:260,h:300,build:buildNotes},
  system:{title:'🗺 System',   w:260,h:320,build:buildSystem},
};

function spawnWindow(type){
  var def=WIN_DEFS[type];if(!def)return;
  var id='w'+(++winCount);
  var W=window.innerWidth,H=window.innerHeight;
  // Spread positions
  var positions=[
    {x:W*.05,y:H*.12},{x:W*.55,y:H*.12},
    {x:W*.05,y:H*.55},{x:W*.55,y:H*.55},
    {x:W*.3,y:H*.2}
  ];
  var pos=positions[(winCount-1)%positions.length];

  var el=document.createElement('div');
  el.className='fw';el.id=id;
  el.style.left=pos.x+'px';el.style.top=pos.y+'px';
  el.style.width=def.w+'px';el.style.height=def.h+'px';
  el.style.animation='winIn .3s cubic-bezier(.2,.8,.2,1)';
  el.innerHTML='<div class="fw-focus-ring"></div>'+
    '<div class="fw-glass">'+
      '<div class="fw-bar" id="'+id+'-bar">'+
        '<span class="fw-title">'+def.title+'</span>'+
        '<div class="fw-controls">'+
          '<button class="fw-btn fw-min" data-id="'+id+'" data-action="min"></button>'+
          '<button class="fw-btn fw-close" data-id="'+id+'" data-action="close"></button>'+
        '</div>'+
      '</div>'+
      '<div class="fw-body">'+def.build(id)+'</div>'+
    '</div>';

  // Inject spawn animation
  if(!document.getElementById('winInKF')){
    var s=document.createElement('style');s.id='winInKF';
    s.textContent='@keyframes winIn{from{opacity:0;transform:scale(.85) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}';
    document.head.appendChild(s);
  }

  document.body.appendChild(el);
  windows.push({id:id,el:el,type:type});
  focusWindow({id:id,el:el});
  makeDraggable(el,id+'-bar');

  // Window button clicks
  el.querySelectorAll('.fw-btn').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      var action=btn.dataset.action;
      if(action==='close')closeWindow(id);
      if(action==='min')minimizeWindow(id);
    });
  });
  el.addEventListener('mousedown',function(){focusWindow({id:id,el:el});});
  el.addEventListener('touchstart',function(){focusWindow({id:id,el:el});},{passive:true});

  if(def.build===buildClock)startClockWindow(id);
  hideMenu();
}

function focusWindow(win){
  windows.forEach(function(w){w.el.classList.remove('focused');});
  win.el.classList.add('focused');
  focusedWin=win;
  win.el.style.zIndex=30+(winCount++);
}

function closeWindow(id){
  var idx=windows.findIndex(function(w){return w.id===id;});
  if(idx===-1)return;
  var el=windows[idx].el;
  el.style.transition='opacity .2s,transform .2s';
  el.style.opacity='0';el.style.transform='scale(.88)';
  setTimeout(function(){el.remove();windows.splice(idx,1);if(focusedWin&&focusedWin.id===id)focusedWin=null;},200);
}

function minimizeWindow(id){
  var w=windows.find(function(w){return w.id===id;});if(!w)return;
  var body=w.el.querySelector('.fw-body');
  if(body){body.style.display=body.style.display==='none'?'block':'none';}
}

function hitTestWindows(x,y){
  for(var i=windows.length-1;i>=0;i--){
    var w=windows[i];
    var r=w.el.getBoundingClientRect();
    if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom)return w;
  }
  return null;
}

function hitTestButton(win,x,y){
  var btns=win.el.querySelectorAll('.fw-btn');
  for(var i=0;i<btns.length;i++){
    var r=btns[i].getBoundingClientRect();
    if(x>=r.left-8&&x<=r.right+8&&y>=r.top-8&&y<=r.bottom+8)return btns[i].dataset.action;
  }
  return null;
}

// ── DRAG WINDOWS (touch/mouse) ─────────────────────────────
function makeDraggable(el,barId){
  var bar=document.getElementById(barId);if(!bar)return;
  var sx,sy,sl,st;
  function start(cx,cy){
    var win=windows.find(function(w){return w.el===el;});
    if(win)focusWindow(win);
    sx=cx;sy=cy;
    sl=parseInt(el.style.left)||0;
    st=parseInt(el.style.top)||0;
  }
  function move(cx,cy){
    el.style.left=(sl+cx-sx)+'px';
    el.style.top=(st+cy-sy)+'px';
  }
  bar.addEventListener('touchstart',function(e){if(e.touches.length===1)start(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  bar.addEventListener('touchmove',function(e){e.stopPropagation();move(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  bar.addEventListener('mousedown',function(e){
    start(e.clientX,e.clientY);
    var mm=function(e){move(e.clientX,e.clientY);};
    var mu=function(){document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  });
}

// ── MENU ──────────────────────────────────────────────────
function showMenu(){menuVisible=true;document.getElementById('menubar').classList.add('show');}
function hideMenu(){menuVisible=false;document.getElementById('menubar').classList.remove('show');}

// Swipe up gesture on empty screen to show menu
document.addEventListener('touchstart',function(e){
  if(e.target.closest('.fw')||e.target.closest('#menubar'))return;
  swipeStartY=e.touches[0].clientY;swipeStartT=Date.now();
},{passive:true});
document.addEventListener('touchend',function(e){
  if(e.target.closest('.fw')||e.target.closest('#menubar'))return;
  var dy=swipeStartY-e.changedTouches[0].clientY;
  var dt=Date.now()-swipeStartT;
  if(dt<400&&dy>80){if(!menuVisible)showMenu();}
  else if(dt<400&&dy<-80){if(menuVisible)hideMenu();}
},{passive:true});
// Mouse scroll on empty = show/hide menu
document.addEventListener('wheel',function(e){
  if(e.target.closest('.fw'))return;
  if(e.deltaY<0)showMenu();else hideMenu();
});

function buildSystem(id){
  var items=[
    ['AR Camera',    '#32D74B','Active'],
    ['Hand Tracking','#32D74B','Active'],
    ['Voice Engine', '#32D74B','Ready'],
    ['Gyroscope',    '#32D74B','Active'],
    ['Eye Tracking', '#4A9EFF','Phase 8'],
    ['Raspberry Pi', '#FFD60A','Phase 9'],
    ['Custom Display','#FFD60A','Phase 9'],
  ];
  return items.map(function(item){
    return'<div class="sys-item"><div class="sys-l"><div class="sys-dot" style="background:'+item[1]+'"></div>'+item[0]+'</div><div class="sys-r" style="color:'+item[1]+'">'+item[2]+'</div></div>';
  }).join('');
}

// Clock window
function startClockWindow(id){
  (function tick(){
    var el=document.getElementById(id+'-t');if(!el)return;
    var n=new Date();
    el.textContent=('0'+n.getHours()).slice(-2)+':'+('0'+n.getMinutes()).slice(-2)+':'+('0'+n.getSeconds()).slice(-2);
    var del=document.getElementById(id+'-d');
    if(del)del.textContent=n.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});
    setTimeout(tick,1000);
  })();
}

// Notes
function saveNote(id){
  var ta=document.getElementById(id+'-ta');if(!ta)return;
  var txt=ta.value.trim();if(!txt)return;
  notes.unshift({txt:txt,time:new Date()});ta.value='';
  var saved=document.getElementById(id+'-saved');
  if(saved)saved.innerHTML=notes.slice(0,5).map(function(n){
    return'<div class="saved-note">'+n.txt+'</div>';
  }).join('');
}

// ── JARVIS AI ─────────────────────────────────────────────
var KB={
  'who are you':'I am JARVIS. Just A Rather Very Intelligent System. Running on your spatial computer. I see what you see through the camera.',
  'what do you see':'I process the camera feed from your device. Hand tracking is active — I can see your hands moving in space.',
  'hardware':'Phase 9 hardware: Raspberry Pi 5 runs this OS. Front and back cameras for hand tracking and passthrough. Gyroscope for head tracking. Total: under ₹12,000.',
  'hand':'Your hands control everything. Point finger = aim cursor. Pinch = click. Open hand = scroll. Fist = drag window. Swipe up = menu.',
  'eye':'Eye tracking is Phase 8. Your eyes will aim the cursor instead of your finger. Combined with hand pinch = the most natural input system.',
  'phase':'Phase 8: eye tracking hardware. Phase 9: Raspberry Pi, custom displays, full headset assembly.',
  'raspberry':'Raspberry Pi 5 will run this exact OS via Chromium. No code changes needed. Plug in cameras and it works.',
  'apple':'Apple Vision Pro costs $3,500. We are building the same spatial computing concept for under ₹12,000.',
};
function jarvisThink(q){
  q=q.toLowerCase();
  if(['hi','hello','hey','namaste'].some(function(g){return q.startsWith(g);})){
    var h=new Date().getHours();
    return'Good '+(h<12?'morning':h<17?'afternoon':'evening')+'. I am JARVIS. Your spatial OS is running. '+(handsActive?'Hand tracking is active.':'Loading hand tracking.');
  }
  if(['bye','goodbye'].some(function(g){return q.includes(g);}))return'Goodbye. Windows stay open and tracking continues.';
  var m=q.match(/(\d+\.?\d*)\s*([+\-x*\/])\s*(\d+\.?\d*)/);
  if(m){var a=parseFloat(m[1]),op=m[2],b=parseFloat(m[3]);var r={'+':a+b,'-':a-b,'*':a*b,'x':a*b,'/':(b?+(a/b).toFixed(4):'∞')}[op];return a+' '+op+' '+b+' = '+r;}
  if(q.includes('time')||q.includes('date')){var n=new Date();return n.toLocaleTimeString('en-IN')+' · '+n.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});}
  for(var k in KB){if(q.includes(k))return KB[k];}
  if(q.includes('window')||q.includes('open'))return'Swipe up or say "open clock" to spawn windows. Available: Clock, Sensors, Notes, System.';
  if(q.includes('help')||q.includes('control'))return KB['hand'];
  if(q.includes('sensor')||q.includes('gyro'))return'Gyroscope readings show in the Sensors window. Real-time orientation tracking active.';
  return'Processing. Ask about: hand controls, eye tracking, hardware phases, or say "open [window name]".';
}

function aiSend(id){
  var inp=document.getElementById(id+'-in');if(!inp)return;
  var txt=inp.value.trim();if(!txt||isThinking)return;
  inp.value='';
  addMsg(id,'u',txt);chatHistory.push({role:'user',content:txt});isThinking=true;
  var th=addMsg(id,'j','…',true);
  setTimeout(function(){
    // Check for open commands
    var low=txt.toLowerCase();
    var winNames={clock:'clock',sensor:'sensors',note:'notes',system:'system',jarvis:'jarvis'};
    var opened=false;
    for(var k in winNames){if(low.includes(k)){spawnWindow(winNames[k]);opened=true;break;}}
    var reply=opened?'Opening '+txt.split(' ').pop()+' window now.':jarvisThink(txt);
    th.remove();addMsg(id,'j',reply);
    chatHistory.push({role:'assistant',content:reply});
    speakText(reply);isThinking=false;
  },300+Math.random()*300);
}

function addMsg(id,who,txt,thinking){
  var msgs=document.getElementById(id+'-msgs');if(!msgs)return null;
  var d=document.createElement('div');
  d.className='ai-bubble ai-'+(who==='u'?'u':'j')+(thinking?' ai-thinking':'');
  d.style.display='flex';d.style.flexDirection='column';d.style.alignSelf=who==='u'?'flex-end':'flex-start';
  d.textContent=txt;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;return d;
}

// ── SENSORS ───────────────────────────────────────────────
function startGyro(){
  var listen=function(){
    window.addEventListener('deviceorientation',function(e){
      windows.forEach(function(w){
        if(w.type==='sensors'){
          var a=document.getElementById(w.id+'-a');if(a)a.textContent=Math.round(e.alpha||0)+'°';
          var b=document.getElementById(w.id+'-b');if(b)b.textContent=Math.round(e.beta||0)+'°';
          var g=document.getElementById(w.id+'-g');if(g)g.textContent=Math.round(e.gamma||0)+'°';
        }
      });
    });
  };
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(function(r){if(r==='granted')listen();});
  } else listen();
}

// Update FPS in sensor windows
setInterval(function(){
  windows.forEach(function(w){
    if(w.type==='sensors'){
      var el=document.getElementById(w.id+'-fps');
      if(el)el.textContent=document.getElementById('hud-fps').textContent.replace(' FPS','');
    }
  });
},1000);

// ── CLOCK ─────────────────────────────────────────────────
function startClock(){
  setInterval(function(){
    var n=new Date();
    var t=('0'+n.getHours()).slice(-2)+':'+('0'+n.getMinutes()).slice(-2);
    document.getElementById('hud-time').textContent=t;
  },1000);
}

// ── VOICE ─────────────────────────────────────────────────
function startVoice(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showGestureFlash('⚠️','Voice needs Chrome');return;}
  if(isListening){try{rec&&rec.stop();}catch(e){}return;}
  rec=new SR();rec.lang='en-IN';rec.continuous=false;rec.interimResults=false;
  rec.onstart=function(){isListening=true;var vb=document.getElementById('voice-bar');vb.classList.add('show');document.getElementById('voice-text').textContent='Listening…';};
  rec.onresult=function(e){
    var t=e.results[0][0].transcript.trim();
    document.getElementById('voice-text').textContent='"'+t+'"';
    // Route to focused JARVIS window or process command
    var jw=windows.find(function(w){return w.type==='jarvis';});
    if(jw){
      var inp=document.getElementById(jw.id+'-in');
      if(inp){inp.value=t;aiSend(jw.id);}
    } else {
      // Voice command without jarvis window
      var low=t.toLowerCase();
      if(low.includes('open')){
        var names={clock:'clock',sensor:'sensors',note:'notes',system:'system',jarvis:'jarvis'};
        for(var k in names){if(low.includes(k)){spawnWindow(names[k]);break;}}
      }
      if(low.includes('close all')){windows.slice().forEach(function(w){closeWindow(w.id);});}
      if(low.includes('menu'))showMenu();
    }
  };
  rec.onend=function(){isListening=false;setTimeout(function(){document.getElementById('voice-bar').classList.remove('show');},1500);};
  rec.onerror=function(e){isListening=false;document.getElementById('voice-bar').classList.remove('show');showGestureFlash('⚠️','Mic: '+e.error);};
  try{rec.start();}catch(e){showGestureFlash('⚠️','Voice failed');}
  hideMenu();
}

function speakText(txt){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(txt.slice(0,160));
  u.rate=0.95;u.pitch=0.8;u.lang='en-IN';
  var go=function(){var v=speechSynthesis.getVoices().find(function(v){return v.lang.startsWith('en');})||speechSynthesis.getVoices()[0];if(v)u.voice=v;speechSynthesis.speak(u);};
  speechSynthesis.getVoices().length?go():(speechSynthesis.onvoiceschanged=go,setTimeout(go,500));
}

// ── GESTURE FLASH ─────────────────────────────────────────
var gfTimer;
function showGestureFlash(icon,text,dur){
  document.getElementById('gf-icon').textContent=icon||'';
  document.getElementById('gf-text').textContent=text||'';
  var el=document.getElementById('gesture-flash');
  el.classList.add('show');clearTimeout(gfTimer);
  gfTimer=setTimeout(function(){el.classList.remove('show');},(dur||1400));
}

// ── RIPPLE ────────────────────────────────────────────────
function spawnRipple(x,y){
  var r=document.createElement('div');r.className='pinch-ripple';
  r.style.left=x+'px';r.style.top=y+'px';
  document.body.appendChild(r);setTimeout(function(){r.remove();},600);
}

// ── CANVAS RESIZE ─────────────────────────────────────────
function resizeCanvas(){
  var c=document.getElementById('hand-canvas');
  c.width=window.innerWidth;c.height=window.innerHeight;
}
window.addEventListener('resize',resizeCanvas);
</script>
